<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tour Admin Autofill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #181c27;
      --surface2:  #1f2436;
      --border:    #2a3050;
      --accent:    #4f8ef7;
      --accent2:   #7c3aed;
      --success:   #22c55e;
      --warning:   #f59e0b;
      --danger:    #ef4444;
      --text:      #e8eaf6;
      --muted:     #6b7280;
      --mono:      'DM Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    body {
      width: 380px;
      min-height: 520px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a1f35 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
      opacity: 0.6;
    }
    .logo {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .header-text h1 {
      font-size: 13px; font-weight: 600; letter-spacing: 0.02em;
      color: var(--text);
    }
    .header-text p {
      font-size: 10px; color: var(--muted); margin-top: 1px;
      font-family: var(--mono);
    }
    .status-dot {
      margin-left: auto;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 2px rgba(107,114,128,0.2);
      transition: all 0.3s;
      flex-shrink: 0;
    }
    .status-dot.ready  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.busy   { background: var(--warning);  box-shadow: 0 0 6px var(--warning); animation: pulse 1s infinite; }
    .status-dot.error  { background: var(--danger);   box-shadow: 0 0 6px var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Panels ── */
    .panel { display: none; flex-direction: column; }
    .panel.active { display: flex; }

    /* ── Setup Panel ── */
    .setup-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    .field-group label {
      display: block;
      font-size: 10px; font-weight: 500;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 5px;
      font-family: var(--mono);
    }
    .field-group input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      padding: 8px 10px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field-group input:focus { border-color: var(--accent); }
    .field-group input::placeholder { color: var(--muted); }

    .help-text {
      font-size: 10px; color: var(--muted);
      margin-top: 4px; line-height: 1.4;
    }
    .help-text a { color: var(--accent); text-decoration: none; }

    .col-section-label {
      font-size: 10px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--accent);
      font-family: var(--mono); padding: 4px 0 2px;
      border-bottom: 1px solid var(--border); margin-bottom: 2px;
    }
    .col-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .col-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    /* col inputs: no forced case — user types as-is */

    /* ── Tour List Panel ── */
    .tour-body { padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 10px; }

    .search-row {
      display: flex; gap: 8px; align-items: center;
    }
    .search-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: var(--accent); }

    .btn-icon {
      width: 30px; height: 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

    .section-label {
      font-size: 10px; font-weight: 500;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.08em; font-family: var(--mono);
    }

    .tour-list {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 280px; overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .tour-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .tour-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.15s;
    }
    .tour-card:hover { border-color: var(--accent); background: var(--surface2); }
    .tour-card:hover::before { opacity: 1; }
    .tour-card.selected { border-color: var(--accent); background: var(--surface2); }
    .tour-card.selected::before { opacity: 1; }

    .tour-card-title {
      font-size: 12px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tour-card-meta {
      display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap;
    }
    .tag {
      font-size: 9px; font-family: var(--mono);
      padding: 2px 6px; border-radius: 3px;
      background: var(--surface2); color: var(--muted);
      border: 1px solid var(--border);
    }
    .tag.blue  { color: var(--accent);   border-color: rgba(79,142,247,0.3); background: rgba(79,142,247,0.08); }
    .tag.green { color: var(--success);  border-color: rgba(34,197,94,0.3);  background: rgba(34,197,94,0.08); }

    .empty-state {
      text-align: center; padding: 30px 16px;
      color: var(--muted); font-size: 12px; line-height: 1.6;
    }
    .empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.5; }

    /* ── Fill Panel ── */
    .fill-body { padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 12px; }

    .back-btn {
      display: flex; align-items: center; gap: 6px;
      background: none; border: none;
      color: var(--muted); font-size: 11px;
      cursor: pointer; font-family: var(--sans);
      padding: 0; transition: color 0.15s;
      width: fit-content;
    }
    .back-btn:hover { color: var(--text); }

    .tour-preview {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .tour-preview-name {
      font-size: 13px; font-weight: 600; color: var(--text);
      margin-bottom: 6px;
    }
    .tour-preview-fields {
      display: flex; flex-direction: column; gap: 4px;
    }
    .preview-row {
      display: flex; gap: 8px; font-size: 11px;
    }
    .preview-key {
      font-family: var(--mono); color: var(--muted);
      min-width: 90px; flex-shrink: 0;
    }
    .preview-val { color: var(--text); }

    .fields-checklist {
      display: flex; flex-direction: column; gap: 4px;
      max-height: 160px; overflow-y: auto;
    }
    .check-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 8px; border-radius: 5px;
      font-size: 11px; color: var(--muted);
      transition: background 0.1s;
    }
    .check-item.done   { color: var(--success); }
    .check-item.active { color: var(--warning); background: rgba(245,158,11,0.06); }
    .check-item.error  { color: var(--danger); }
    .check-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
      background: var(--border);
    }
    .check-item.done   .check-dot { background: var(--success); }
    .check-item.active .check-dot { background: var(--warning); animation: pulse 0.8s infinite; }
    .check-item.error  .check-dot { background: var(--danger); }

    /* ── Buttons ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 14px; border-radius: 7px;
      font-family: var(--sans); font-size: 12px; font-weight: 500;
      cursor: pointer; border: none; transition: all 0.15s;
      letter-spacing: 0.01em;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #3b6fd4);
      color: #fff;
      box-shadow: 0 2px 8px rgba(79,142,247,0.3);
    }
    .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 4px 12px rgba(79,142,247,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }
    .btn-secondary {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: var(--danger);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }

    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 12px; left: 12px; right: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      display: flex; align-items: center; gap: 8px;
      transform: translateY(60px); opacity: 0;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 100;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(34,197,94,0.4); }
    .toast.error   { border-color: rgba(239,68,68,0.4); }

    /* ── Settings gear ── */
    .settings-btn {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 14px; padding: 2px;
      transition: color 0.15s; line-height: 1;
    }
    .settings-btn:hover { color: var(--text); }

    /* ── Divider ── */
    .divider {
      height: 1px; background: var(--border);
      margin: 2px 0;
    }

    /* ── Loading spinner ── */
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Config status bar ── */
    .config-bar {
      padding: 6px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 10px; color: var(--muted); font-family: var(--mono);
    }
    .config-bar .connected { color: var(--success); }
    .config-bar .disconnected { color: var(--danger); }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">✈</div>
  <div class="header-text">
    <h1>Tour Admin Autofill</h1>
    <p>Google Sheets → Admin Panel</p>
  </div>
  <button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>
  <div class="status-dot" id="statusDot"></div>
</div>

<!-- Config bar (shown when configured) -->
<div class="config-bar" id="configBar" style="display:none">
  <span id="configSheetInfo">No sheet configured</span>
  <span id="configConnStatus" class="disconnected">● not connected</span>
</div>

<!-- ══ PANEL: Setup ══ -->
<div class="panel active" id="panelSetup">
  <div class="setup-body">

    <button class="back-btn" id="setupCloseBtn" style="display:none">← Back to tours</button>

    <div class="col-section-label">Connection</div>

    <div class="field-group">
      <label>Google Sheet ID</label>
      <input type="text" id="sheetId" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" />
      <div class="help-text">
        Found in your sheet URL: docs.google.com/spreadsheets/d/<strong style="color:var(--accent)">SHEET_ID</strong>/edit
      </div>
    </div>

    <div class="col-row">
      <div class="field-group">
        <label>Sheet Tab Name</label>
        <input type="text" id="sheetTab" placeholder="Sheet1" />
      </div>
      <div class="field-group">
        <label>Google API Key</label>
        <input type="password" id="apiKey" placeholder="AIza…" />
      </div>
    </div>

    <div class="col-section-label">Core Columns</div>
    <div class="col-grid">
      <div class="field-group">
        <label>Tour Title</label>
        <input type="text" id="colTitle" placeholder="A" maxlength="3" />
      </div>
      <div class="field-group">
        <label>Doc URL</label>
        <input type="text" id="colDocUrl" placeholder="B" maxlength="3" />
      </div>
      <div class="field-group">
        <label>Country</label>
        <input type="text" id="colCountry" placeholder="C" maxlength="3" />
      </div>
      <div class="field-group">
        <label>City</label>
        <input type="text" id="colCity" placeholder="D" maxlength="3" />
      </div>
      <div class="field-group">
        <label>Duration</label>
        <input type="text" id="colDuration" placeholder="E" maxlength="3" />
      </div>
      <div class="field-group">
        <label>Product Type</label>
        <input type="text" id="colServiceType" placeholder="F" maxlength="3" />
      </div>
    </div>

    <div class="col-section-label">Pricing Columns</div>
    <div class="col-grid">
      <div class="field-group">
        <label>B2B Instant</label>
        <input type="text" id="colRate" placeholder="G" maxlength="3" />
      </div>
      <div class="field-group">
        <label>B2B On Request</label>
        <input type="text" id="colRateRequest" placeholder="H" maxlength="3" />
      </div>
      <div class="field-group">
        <label>B2C Instant</label>
        <input type="text" id="colRateB2C" placeholder="I" maxlength="3" />
      </div>
      <div class="field-group">
        <label>B2C On Request</label>
        <input type="text" id="colRateRequestB2C" placeholder="J" maxlength="3" />
      </div>
    </div>

    <div class="col-section-label">Cancellation &amp; Cut Off Columns</div>
    <div class="col-grid">
      <div class="field-group">
        <label>Cancel Instant</label>
        <input type="text" id="colCancellation" placeholder="K" maxlength="3" />
      </div>
      <div class="field-group">
        <label>Cancel On Request</label>
        <input type="text" id="colCancellationRequest" placeholder="L" maxlength="3" />
      </div>
      <div class="field-group">
        <label>Cut Off Instant</label>
        <input type="text" id="colRelease" placeholder="M" maxlength="3" />
      </div>
      <div class="field-group">
        <label>Cut Off On Request</label>
        <input type="text" id="colReleaseRequest" placeholder="N" maxlength="3" />
      </div>
    </div>

    <button class="btn btn-primary" id="saveConfigBtn">
      Save &amp; Load Tours
    </button>
  </div>
</div>

<!-- ══ PANEL: Tour List ══ -->
<div class="panel" id="panelList">
  <div class="tour-body">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Search tours…" />
      <button class="btn-icon" id="refreshBtn" title="Refresh">↻</button>
    </div>
    <div class="section-label" id="tourCountLabel">Loading…</div>
    <div class="tour-list" id="tourList">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        Loading tours from sheet…
      </div>
    </div>
    <button class="btn btn-primary" id="selectFillBtn" disabled>
      Fill Selected Tour →
    </button>
  </div>
</div>

<!-- ══ PANEL: Fill ══ -->
<div class="panel" id="panelFill">
  <div class="fill-body">
    <button class="back-btn" id="backBtn">← Back to tours</button>

    <div class="tour-preview" id="tourPreview">
      <div class="tour-preview-name" id="previewName">—</div>
      <div class="tour-preview-fields" id="previewFields"></div>
    </div>

    <div class="divider"></div>

    <div class="section-label">Fields to fill</div>
    <div class="fields-checklist" id="fieldsChecklist"></div>

    <div class="btn-row">
      <button class="btn btn-secondary" id="openSectionBtn">Open All Sections</button>
      <button class="btn btn-primary" id="startFillBtn">
        ▶ Start Autofill
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span id="toastIcon">✓</span>
  <span id="toastMsg">Done</span>
</div>

<script src="src/popup.js"></script>
</body>
</html>
